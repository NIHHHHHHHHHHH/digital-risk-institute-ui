<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 100" width="520" height="100" role="img"
    aria-label="Institute of Digital Risk — IDR">

    <!-- circuit traces-->

    <!-- top left (inactive) -->
    <line x1="22" y1="30" x2="7" y2="30" stroke="#111111" stroke-width="1.4" stroke-linecap="round" opacity="0.18" />
    <line x1="7" y1="30" x2="7" y2="14" stroke="#111111" stroke-width="1.4" stroke-linecap="round" opacity="0.18" />
    <circle cx="7" cy="12" r="2.2" fill="#111111" opacity="0.18" />

    <!-- top right (inactive) -->
    <line x1="63" y1="19" x2="76" y2="11" stroke="#111111" stroke-width="1.4" stroke-linecap="round" opacity="0.15" />
    <line x1="76" y1="11" x2="90" y2="11" stroke="#111111" stroke-width="1.4" stroke-linecap="round" opacity="0.15" />
    <circle cx="92" cy="11" r="2.2" fill="#111111" opacity="0.15" />

    <!-- right arm (orange — active) -->
    <line x1="86" y1="50" x2="100" y2="50" stroke="#F97316" stroke-width="1.8" stroke-linecap="round" />
    <line x1="100" y1="50" x2="100" y2="30" stroke="#F97316" stroke-width="1.8" stroke-linecap="round" />
    <circle cx="100" cy="27" r="3" fill="#F97316" />

    <!-- bottom left (orange — active) -->
    <line x1="22" y1="72" x2="7" y2="82" stroke="#F97316" stroke-width="1.8" stroke-linecap="round" />
    <line x1="7" y1="82" x2="7" y2="94" stroke="#F97316" stroke-width="1.8" stroke-linecap="round" />
    <circle cx="7" cy="97" r="3" fill="#F97316" />

    <!-- bottom right (inactive) -->
    <line x1="63" y1="82" x2="76" y2="90" stroke="#111111" stroke-width="1.4" stroke-linecap="round" opacity="0.15" />
    <line x1="76" y1="90" x2="90" y2="90" stroke="#111111" stroke-width="1.4" stroke-linecap="round" opacity="0.15" />
    <circle cx="92" cy="90" r="2.2" fill="#111111" opacity="0.15" />


    <!-- hex icon -->

    <!-- hex body -->
    <polygon points="44,6 86,29 86,71 44,94 2,71 2,29" fill="#FFFFFF" stroke="#111111" stroke-width="2.8"
        stroke-linejoin="round" />

    <!-- inner hex ring -->
    <polygon points="44,18 72,34 72,66 44,82 16,66 16,34" fill="none" stroke="#F97316" stroke-width="1.1"
        opacity="0.22" />

    <!-- alert bar -->
    <line x1="44" y1="32" x2="44" y2="56" stroke="#F97316" stroke-width="5" stroke-linecap="round" />

    <!-- alert dot -->
    <circle cx="44" cy="66" r="4.5" fill="#F97316" />


    <!-- divider -->
    <line x1="116" y1="14" x2="116" y2="86" stroke="#E2E8F0" stroke-width="1.2" />


    <!-- wordmark -->

    <!-- IDR -->
    <text x="132" y="52" font-family="'DM Sans', system-ui, sans-serif" font-weight="800" font-size="44" fill="#111111"
        letter-spacing="3">IDR</text>

    <!-- orange underline under IDR -->
    <rect x="132" y="58" width="90" height="3" rx="1.5" fill="#F97316" />

    <!-- full name — large enough to be readable when scaled -->
    <text x="133" y="78" font-family="'DM Sans', system-ui, sans-serif" font-weight="600" font-size="16" fill="#1e293b"
        letter-spacing="2.5">INSTITUTE OF DIGITAL RISK</text>

</svg>