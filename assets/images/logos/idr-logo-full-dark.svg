<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 88" width="440" height="88" role="img"
    aria-label="Institute of Digital Risk — IDR (dark variant)">

    <!--  circuit traces -->

    <!-- top left trace (inactive — white on dark) -->
    <line x1="18" y1="28" x2="7" y2="28" stroke="#FFFFFF" stroke-width="1.1" stroke-linecap="round" opacity="0.18" />
    <line x1="7" y1="28" x2="7" y2="15" stroke="#FFFFFF" stroke-width="1.1" stroke-linecap="round" opacity="0.18" />
    <circle cx="7" cy="13" r="2" fill="#FFFFFF" opacity="0.18" />

    <!-- top right trace (inactive) -->
    <line x1="52" y1="18" x2="64" y2="11" stroke="#FFFFFF" stroke-width="1.1" stroke-linecap="round" opacity="0.15" />
    <line x1="64" y1="11" x2="74" y2="11" stroke="#FFFFFF" stroke-width="1.1" stroke-linecap="round" opacity="0.15" />
    <circle cx="76" cy="11" r="1.8" fill="#FFFFFF" opacity="0.15" />

    <!-- right trace (orange — active) -->
    <line x1="67" y1="44" x2="78" y2="44" stroke="#F97316" stroke-width="1.4" stroke-linecap="round" />
    <line x1="78" y1="44" x2="78" y2="30" stroke="#F97316" stroke-width="1.4" stroke-linecap="round" />
    <circle cx="78" cy="28" r="2.2" fill="#F97316" />

    <!-- bottom left trace (orange — active) -->
    <line x1="18" y1="60" x2="7" y2="67" stroke="#F97316" stroke-width="1.4" stroke-linecap="round" />
    <line x1="7" y1="67" x2="7" y2="76" stroke="#F97316" stroke-width="1.4" stroke-linecap="round" />
    <circle cx="7" cy="78" r="2.2" fill="#F97316" />

    <!-- bottom right trace (inactive) -->
    <line x1="52" y1="70" x2="64" y2="77" stroke="#FFFFFF" stroke-width="1.1" stroke-linecap="round" opacity="0.15" />
    <line x1="64" y1="77" x2="74" y2="77" stroke="#FFFFFF" stroke-width="1.1" stroke-linecap="round" opacity="0.15" />
    <circle cx="76" cy="77" r="1.8" fill="#FFFFFF" opacity="0.15" />


    <!-- hex icon -->

    <!-- hex body — transparent fill on dark bg -->
    <polygon points="35,7 67,25 67,62 35,80 3,62 3,25" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.7)"
        stroke-width="2.2" stroke-linejoin="round" />

    <!-- inner hex ring -->
    <polygon points="35,17 59,31 59,58 35,72 11,58 11,31" fill="none" stroke="#F97316" stroke-width="0.9"
        opacity="0.3" />

    <!-- alert bar -->
    <line x1="35" y1="30" x2="35" y2="52" stroke="#F97316" stroke-width="3.8" stroke-linecap="round" />

    <!-- alert dot -->
    <circle cx="35" cy="60" r="3.2" fill="#F97316" />


    <!-- divider -->
    <line x1="96" y1="14" x2="96" y2="74" stroke="rgba(255,255,255,0.12)" stroke-width="1" />


    <!-- wordmark — white on dark-->

    <!-- ird — white -->
    <text x="112" y="56" font-family="'DM Sans', system-ui, sans-serif" font-weight="800" font-size="38" fill="#FFFFFF"
        letter-spacing="2">IDR</text>

    <!-- orange underline -->
    <rect x="112" y="62" width="72" height="2.5" rx="1.5" fill="#F97316" />

    <!-- full name — muted white -->
    <text x="113" y="76" font-family="'DM Sans', system-ui, sans-serif" font-weight="500" font-size="9"
        fill="rgba(255,255,255,0.42)" letter-spacing="3.2">INSTITUTE OF DIGITAL RISK</text>

</svg>